<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 1</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f6f8;
            line-height: 1.6;
        }

        .container {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .details p {
            margin: 5px 0;
            font-weight: bold;
        }

        a {
            color: #007BFF;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        img {
            margin-top: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            transition: transform 0.3s;
        }

        img:hover {
            transform: scale(1.05);
        }

        hr {
            margin: 20px 0;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Header Section -->
    <div class="header">
        <h1>Experiment 1</h1>
        <h2>Aim: Study of Web Technology basics along with different web technology languages</h2>
    </div>

    <!-- Student Details -->
    <div class="details">
        <p>Name: Gautami Upadhye</p>
        <p>Roll No: 99</p>
        <p>Batch: S4</p>
    </div>

    <hr>

    <!-- Link Example -->
    <h2>Hyperlink Example</h2>
    <p>
        Click the link below to visit Google:
        <br>
        <a href="https://www.google.com" target="_blank">
            Visit Google
        </a>
    </p>

    <hr>

    <!-- Image Example -->
    <h2>Image Example</h2>
    <p>Click the image below to open it in a new tab:</p>

    <a href="https://via.placeholder.com/600" target="_blank">
        <img src="https://via.placeholder.com/200" alt="Sample Image">
    </a>

</div>

</body>
</html>
